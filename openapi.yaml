components:
  schemas:
    Body_embed_visual_embed_visual_post:
      properties:
        file:
          format: binary
          title: File
          type: string
      required:
      - file
      title: Body_embed_visual_embed_visual_post
      type: object
    Body_ingest_media_ingest_media_post:
      properties:
        file:
          format: binary
          title: File
          type: string
      required:
      - file
      title: Body_ingest_media_ingest_media_post
      type: object
    Body_speech_to_text_stt_post:
      properties:
        audio:
          format: binary
          title: Audio
          type: string
      required:
      - audio
      title: Body_speech_to_text_stt_post
      type: object
    DependencyStatus:
      description: Status of an individual dependency (database, service, etc.).
      properties:
        connected:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Connected
        details:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Details
        latency_ms:
          anyOf:
          - type: number
          - type: 'null'
          title: Latency Ms
        status:
          enum:
          - healthy
          - degraded
          - unavailable
          title: Status
          type: string
      required:
      - status
      title: DependencyStatus
      type: object
    EmbedTextRequest:
      properties:
        model:
          default: default
          description: Optional embedding model identifier
          title: Model
          type: string
        text:
          description: Text to embed
          title: Text
          type: string
      required:
      - text
      title: EmbedTextRequest
      type: object
    EmbedTextResponse:
      properties:
        dimension:
          description: Embedding dimension
          title: Dimension
          type: integer
        embedding:
          description: Vector embedding
          items:
            type: number
          title: Embedding
          type: array
        embedding_id:
          description: Unique identifier for this embedding
          title: Embedding Id
          type: string
        model:
          description: Model used for embedding
          title: Model
          type: string
      required:
      - embedding
      - dimension
      - model
      - embedding_id
      title: EmbedTextResponse
      type: object
    Entity:
      properties:
        end:
          title: End
          type: integer
        label:
          title: Label
          type: string
        start:
          title: Start
          type: integer
        text:
          title: Text
          type: string
      required:
      - text
      - label
      - start
      - end
      title: Entity
      type: object
    FeedbackPayload:
      description: Feedback sent from Sophia to Hermes.
      properties:
        correlation_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Correlation Id
        execution_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Execution Id
        feedback_type:
          enum:
          - observation
          - plan
          - execution
          - validation
          title: Feedback Type
          type: string
        node_ids_created:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Node Ids Created
        outcome:
          enum:
          - accepted
          - rejected
          - created
          - success
          - failure
          - partial
          title: Outcome
          type: string
        plan_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Plan Id
        reason:
          title: Reason
          type: string
        source_service:
          default: sophia
          title: Source Service
          type: string
        state_diff:
          anyOf:
          - $ref: '#/components/schemas/StateDiff'
          - type: 'null'
        step_results:
          anyOf:
          - items:
              $ref: '#/components/schemas/StepResult'
            type: array
          - type: 'null'
          title: Step Results
        timestamp:
          format: date-time
          title: Timestamp
          type: string
      required:
      - feedback_type
      - outcome
      - reason
      title: FeedbackPayload
      type: object
    FeedbackResponse:
      description: Response to feedback submission.
      properties:
        message:
          default: Feedback received
          title: Message
          type: string
        status:
          default: accepted
          title: Status
          type: string
      title: FeedbackResponse
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthResponse:
      description: "Unified health response for all LOGOS services.\n\nExample response:\n\
        \    {\n        \"status\": \"healthy\",\n        \"service\": \"hermes\"\
        ,\n        \"version\": \"0.2.0\",\n        \"timestamp\": \"2025-12-06T15:30:00Z\"\
        ,\n        \"dependencies\": {\n            \"neo4j\": {\"status\": \"healthy\"\
        , \"connected\": true, \"latency_ms\": 5.2},\n            \"milvus\": {\"\
        status\": \"healthy\", \"connected\": true}\n        },\n        \"capabilities\"\
        : {\n            \"embedding\": \"openai\",\n            \"llm\": \"anthropic\"\
        \n        }\n    }\n\nUsage:\n    @app.get(\"/health\", response_model=HealthResponse)\n\
        \    async def health():\n        neo4j_ok = await check_neo4j()\n       \
        \ return HealthResponse(\n            status=\"healthy\" if neo4j_ok else\
        \ \"degraded\",\n            service=\"my-service\",\n            version=__version__,\n\
        \            dependencies={\n                \"neo4j\": DependencyStatus(\n\
        \                    status=\"healthy\" if neo4j_ok else \"unavailable\",\n\
        \                    connected=neo4j_ok\n                )\n            }\n\
        \        )"
      properties:
        capabilities:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Capabilities
        dependencies:
          anyOf:
          - additionalProperties:
              $ref: '#/components/schemas/DependencyStatus'
            type: object
          - type: 'null'
          title: Dependencies
        service:
          title: Service
          type: string
        status:
          enum:
          - healthy
          - degraded
          - unavailable
          title: Status
          type: string
        timestamp:
          title: Timestamp
          type: string
        version:
          title: Version
          type: string
      required:
      - status
      - service
      - version
      title: HealthResponse
      type: object
    LLMChoice:
      properties:
        finish_reason:
          default: stop
          description: Reason generation completed.
          title: Finish Reason
          type: string
        index:
          description: Choice index.
          title: Index
          type: integer
        message:
          $ref: '#/components/schemas/LLMMessage'
          description: Assistant message payload.
      required:
      - index
      - message
      title: LLMChoice
      type: object
    LLMMessage:
      properties:
        content:
          description: Text content of the message.
          title: Content
          type: string
        name:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional identifier for tool/function calls.
          title: Name
        role:
          description: Role of the message.
          enum:
          - system
          - user
          - assistant
          - tool
          title: Role
          type: string
      required:
      - role
      - content
      title: LLMMessage
      type: object
    LLMRequest:
      properties:
        experiment_tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Tags for experiment tracking (e.g. ['baseline', 'v2-ner']).
          title: Experiment Tags
        max_tokens:
          anyOf:
          - minimum: 1.0
            type: integer
          - type: 'null'
          description: Optional maximum tokens for the completion.
          title: Max Tokens
        messages:
          anyOf:
          - items:
              $ref: '#/components/schemas/LLMMessage'
            type: array
          - type: 'null'
          description: Conversation history to send to the provider.
          title: Messages
        metadata:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Additional metadata stored alongside the request.
          title: Metadata
        model:
          anyOf:
          - type: string
          - type: 'null'
          description: Override provider model for this request.
          title: Model
        prompt:
          anyOf:
          - type: string
          - type: 'null'
          description: Convenience field converted to a single user message.
          title: Prompt
        provider:
          anyOf:
          - type: string
          - type: 'null'
          description: Override configured provider (e.g., `openai`, `echo`).
          title: Provider
        temperature:
          anyOf:
          - maximum: 2.0
            minimum: 0.0
            type: number
          - type: 'null'
          default: 0.7
          description: Sampling temperature to forward to the provider.
          title: Temperature
      title: LLMRequest
      type: object
    LLMResponse:
      properties:
        choices:
          description: Choices returned by provider.
          items:
            $ref: '#/components/schemas/LLMChoice'
          title: Choices
          type: array
        created:
          description: Epoch timestamp when created.
          title: Created
          type: integer
        id:
          description: Provider response identifier.
          title: Id
          type: string
        model:
          description: Provider model identifier.
          title: Model
          type: string
        provider:
          description: Provider used for the completion.
          title: Provider
          type: string
        raw:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          description: Raw provider response for diagnostics.
          title: Raw
        usage:
          anyOf:
          - $ref: '#/components/schemas/LLMUsage'
          - type: 'null'
          description: Token usage metadata if returned by provider.
      required:
      - id
      - provider
      - model
      - created
      - choices
      title: LLMResponse
      type: object
    LLMUsage:
      properties:
        completion_tokens:
          description: Completion token count.
          title: Completion Tokens
          type: integer
        prompt_tokens:
          description: Prompt token count.
          title: Prompt Tokens
          type: integer
        total_tokens:
          description: Total token count.
          title: Total Tokens
          type: integer
      required:
      - prompt_tokens
      - completion_tokens
      - total_tokens
      title: LLMUsage
      type: object
    MediaIngestResponse:
      description: Response from media ingestion.
      properties:
        embedding_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Milvus embedding ID if generated
          title: Embedding Id
        file_path:
          description: Path where media is stored
          title: File Path
          type: string
        media_type:
          description: Type of media (IMAGE, VIDEO, AUDIO)
          title: Media Type
          type: string
        message:
          description: Status message
          title: Message
          type: string
        metadata:
          additionalProperties: true
          description: Extracted metadata
          title: Metadata
          type: object
        neo4j_node_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Neo4j node ID if persisted
          title: Neo4J Node Id
        sample_id:
          description: Unique identifier for the media sample
          title: Sample Id
          type: string
        transcription:
          anyOf:
          - type: string
          - type: 'null'
          description: Transcription for audio/video
          title: Transcription
      required:
      - sample_id
      - file_path
      - media_type
      - message
      title: MediaIngestResponse
      type: object
    NameClusterMember:
      properties:
        hermes_type_hint:
          anyOf:
          - type: string
          - type: 'null'
          title: Hermes Type Hint
        id:
          anyOf:
          - type: string
          - type: 'null'
          title: Id
        name:
          title: Name
          type: string
        neighbors:
          items:
            additionalProperties: true
            type: object
          title: Neighbors
          type: array
        type:
          anyOf:
          - type: string
          - type: 'null'
          title: Type
      required:
      - name
      title: NameClusterMember
      type: object
    NameClusterRequest:
      properties:
        candidates:
          items:
            type: string
          title: Candidates
          type: array
        members:
          description: Cluster members to name (must be non-empty)
          items:
            $ref: '#/components/schemas/NameClusterMember'
          minItems: 1
          title: Members
          type: array
      required:
      - members
      title: NameClusterRequest
      type: object
    NameClusterResponse:
      properties:
        confidence:
          default: 0.5
          title: Confidence
          type: number
        description:
          default: ''
          title: Description
          type: string
        label:
          title: Label
          type: string
        parent:
          anyOf:
          - type: string
          - type: 'null'
          description: When `label` is a newly coined type (not one of the supplied
            candidates), the existing candidate to graft it under; None when reusing
            a candidate or no listed category is a sensible parent.
          title: Parent
        removed:
          description: Member ids that do not fit the named category (outliers).
          items:
            type: string
          title: Removed
          type: array
      required:
      - label
      title: NameClusterResponse
      type: object
    NameRelationshipRequest:
      properties:
        context:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional context sentence
          title: Context
        source_name:
          description: Source node name
          title: Source Name
          type: string
        target_name:
          description: Target node name
          title: Target Name
          type: string
      required:
      - source_name
      - target_name
      title: NameRelationshipRequest
      type: object
    NameRelationshipResponse:
      properties:
        bidirectional:
          default: false
          description: Whether the relationship is bidirectional
          title: Bidirectional
          type: boolean
        relationship:
          description: Suggested edge label (UPPER_SNAKE_CASE)
          title: Relationship
          type: string
      required:
      - relationship
      title: NameRelationshipResponse
      type: object
    NameTypeRequest:
      properties:
        node_names:
          description: Cluster of node names to classify
          items:
            type: string
          minItems: 1
          title: Node Names
          type: array
        parent_type:
          anyOf:
          - type: string
          - type: 'null'
          description: Optional parent type hint
          title: Parent Type
      required:
      - node_names
      title: NameTypeRequest
      type: object
    NameTypeResponse:
      properties:
        type_name:
          description: Suggested type name for the cluster
          title: Type Name
          type: string
      required:
      - type_name
      title: NameTypeResponse
      type: object
    POSTag:
      properties:
        tag:
          title: Tag
          type: string
        token:
          title: Token
          type: string
      required:
      - token
      - tag
      title: POSTag
      type: object
    STTResponse:
      properties:
        confidence:
          description: Confidence score (0.0 to 1.0)
          title: Confidence
          type: number
        text:
          description: Transcribed text
          title: Text
          type: string
      required:
      - text
      - confidence
      title: STTResponse
      type: object
    SimpleNLPRequest:
      properties:
        operations:
          default:
          - tokenize
          description: List of NLP operations to perform
          items:
            type: string
          title: Operations
          type: array
        text:
          description: Text to process
          title: Text
          type: string
      required:
      - text
      title: SimpleNLPRequest
      type: object
    SimpleNLPResponse:
      properties:
        entities:
          anyOf:
          - items:
              $ref: '#/components/schemas/Entity'
            type: array
          - type: 'null'
          title: Entities
        lemmas:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Lemmas
        pos_tags:
          anyOf:
          - items:
              $ref: '#/components/schemas/POSTag'
            type: array
          - type: 'null'
          title: Pos Tags
        tokens:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tokens
      title: SimpleNLPResponse
      type: object
    StateDiff:
      description: Changes to CWM state.
      properties:
        added_nodes:
          items:
            type: string
          title: Added Nodes
          type: array
        modified_nodes:
          items:
            type: string
          title: Modified Nodes
          type: array
        removed_nodes:
          items:
            type: string
          title: Removed Nodes
          type: array
      title: StateDiff
      type: object
    StepResult:
      description: Result of a single plan step execution.
      properties:
        action:
          title: Action
          type: string
        duration_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Duration Ms
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
        outcome:
          enum:
          - success
          - failure
          - skipped
          title: Outcome
          type: string
        step_index:
          title: Step Index
          type: integer
      required:
      - step_index
      - action
      - outcome
      title: StepResult
      type: object
    TTSRequest:
      properties:
        language:
          default: en-US
          description: Language code
          title: Language
          type: string
        text:
          description: Text to synthesize
          title: Text
          type: string
        voice:
          default: default
          description: Optional voice identifier
          title: Voice
          type: string
      required:
      - text
      title: TTSRequest
      type: object
    TypeClusterMember:
      properties:
        hermes_type_hint:
          anyOf:
          - type: string
          - type: 'null'
          title: Hermes Type Hint
        id:
          minLength: 1
          title: Id
          type: string
        name:
          minLength: 1
          title: Name
          type: string
        neighbors:
          items:
            additionalProperties: true
            type: object
          title: Neighbors
          type: array
      required:
      - id
      - name
      title: TypeClusterMember
      type: object
    TypeClusterRequest:
      properties:
        catalog_k:
          anyOf:
          - type: integer
          - type: 'null'
          title: Catalog K
        members:
          description: Cluster members to type (non-empty)
          items:
            $ref: '#/components/schemas/TypeClusterMember'
          minItems: 1
          title: Members
          type: array
        request_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Request Id
      required:
      - members
      title: TypeClusterRequest
      type: object
    TypeClusterResponse:
      description: "As-designed contract (#127): Hermes NAMES the cluster, picks an\
        \ existing\nPARENT when minting, and flags the OUTLIERS. The cascade asserts\
        \ placement\n(reuse / graft / root + the full IS_A chain) from the name +\
        \ parent.\n\nparent semantics: null  => `name` is an existing type to REUSE.\n\
        \                   set   => mint NEW `name` under this existing parent\n\
        \                            (which may be a domain root).\nThe model works\
        \ in NAMES only -- never a chain, never an id."
      properties:
        name:
          default: ''
          title: Name
          type: string
        over_specified:
          default: false
          title: Over Specified
          type: boolean
        parent:
          anyOf:
          - type: string
          - type: 'null'
          title: Parent
        raw_partition_ok:
          default: true
          title: Raw Partition Ok
          type: boolean
        request_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Request Id
        residual_ids:
          items:
            type: string
          title: Residual Ids
          type: array
      title: TypeClusterResponse
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  description: Stateless language & embedding tools for Project LOGOS
  title: Hermes API
  version: 0.1.0
openapi: 3.1.0
paths:
  /:
    get:
      description: Root endpoint with API information.
      operationId: root__get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Root  Get
                type: object
          description: Successful Response
      summary: Root
  /embed_text:
    post:
      description: "Generate vector embeddings for input text.\n\nArgs:\n    request:\
        \ EmbedTextRequest with text and model\n\nReturns:\n    EmbedTextResponse\
        \ with embedding vector"
      operationId: embed_text_embed_text_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbedTextRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbedTextResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Embed Text
  /embed_visual:
    post:
      description: Generate visual embeddings for an uploaded image.
      operationId: embed_visual_embed_visual_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_embed_visual_embed_visual_post'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Embed Visual Embed Visual Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Embed Visual
  /feedback:
    post:
      description: "Receive feedback from Sophia about proposal/execution outcomes.\n\
        \nThis endpoint accepts structured feedback tied to correlation IDs,\nplan\
        \ IDs, or execution IDs. The feedback is logged for observability.\n\nArgs:\n\
        \    payload: Feedback payload from Sophia\n    request: HTTP request for\
        \ correlation ID extraction\n\nReturns:\n    FeedbackResponse acknowledging\
        \ receipt"
      operationId: receive_feedback_feedback_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackPayload'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Receive Feedback
  /health:
    get:
      description: 'Health check endpoint with detailed service status.


        Returns the overall health status and availability of ML services,

        Milvus connectivity, and LLM provider status.

        Supports both GET and HEAD methods for health probes.


        The HEAD variant is registered for lightweight liveness probes but is

        excluded from the OpenAPI schema so the served document does not emit a

        duplicate ``operationId`` for the same path.'
      operationId: getHealth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: Successful Response
      summary: Health
  /ingest/media:
    post:
      description: "Ingest media, process it through Hermes, and forward to Sophia.\n\
        \nThis endpoint:\n1. Receives media from Apollo\n2. Processes it (STT for\
        \ audio, embedding generation, etc.)\n3. Forwards to Sophia for storage and\
        \ perception workflows\n\nArgs:\n    file: Media file to ingest (image/video/audio)\n\
        \    media_type: Type of media (image, video, audio)\n    question: Optional\
        \ question context for perception\n\nReturns:\n    MediaIngestResponse with\
        \ sample_id and processing results"
      operationId: ingest_media_ingest_media_post
      parameters:
      - in: query
        name: media_type
        required: false
        schema:
          default: image
          title: Media Type
          type: string
      - in: query
        name: question
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Question
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_ingest_media_ingest_media_post'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaIngestResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Ingest Media
  /llm:
    post:
      description: 'Proxy language model completions through Hermes.


        Flow (cognitive loop):

        1. Extract user text from the request

        2. Send structured proposal to Sophia, get relevant context back

        3. Inject context as a system message into the LLM prompt

        4. Generate LLM response with enriched context'
      operationId: llm_generate_llm_post
      requestBody:
        content:
